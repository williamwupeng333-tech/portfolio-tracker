<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Advanced Portfolio Analytics V3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800 font-sans">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter italic">QUANT<span class="text-blue-600">TRACKER</span></h1>
            <div id="sync-indicator" class="text-[9px] font-mono bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full uppercase tracking-widest font-bold">Syncing Live Data...</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="p-8 bg-slate-900 rounded-[2rem] text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mb-2">Total Equity (USD)</p>
                <h2 id="total-val-usd" class="text-4xl font-mono font-bold tracking-tighter">$--</h2>
                <div id="price-tags" class="mt-6 flex flex-wrap gap-2"></div>
            </div>
            <div class="p-8 bg-blue-600 rounded-[2rem] text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-[0.2em] mb-2">Your IRR</p>
                <h2 id="irr-val" class="text-4xl font-mono font-bold tracking-tighter">--%</h2>
                <div class="mt-4 text-[10px] bg-blue-700/50 p-2 rounded-lg font-medium">目标: 17.00% 年化</div>
            </div>
            <div class="p-8 bg-emerald-600 rounded-[2rem] text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-[0.2em] mb-2">S&P 500 IRR</p>
                <h2 id="sp500-irr-val" class="text-4xl font-mono font-bold tracking-tighter">--%</h2>
                <div class="mt-4 text-[10px] bg-emerald-700/50 p-2 rounded-lg font-medium">Benchmark (IVV/VOO)</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">📈 IRR 对比曲线 (Your vs S&P500)</p>
                <div class="h-[280px]"><canvas id="irrChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">💰 总金额增长曲线 (Equity USD)</p>
                <div class="h-[280px]"><canvas id="equityChart"></canvas></div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
            <div class="grid grid-cols-2 md:grid-cols-7 gap-4 items-end">
                <div class="col-span-2 md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Date</label><input type="date" id="d" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Ticker</label><input type="text" id="tk" placeholder="TCOM" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm font-bold uppercase outline-none focus:ring-2 focus:ring-blue-500"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Cur</label><select id="curr" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm font-bold outline-none"><option value="USD">USD</option><option value="HKD">HKD</option><option value="SGD">SGD</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Type</label><select id="type" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm font-bold outline-none"><option value="BUY">BUY</option><option value="SELL" class="text-red-500">SELL</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Shares</label><input type="number" id="sh" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-2 uppercase">Price</label><input type="number" id="pr" class="w-full bg-slate-50 border-none p-3 rounded-xl text-sm outline-none"></div>
                <button onclick="add()" class="bg-blue-600 text-white p-3 rounded-xl font-bold hover:bg-slate-900 transition shadow-lg shadow-blue-100 uppercase text-xs">Add Trade</button>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
            <table class="w-full text-left text-xs"><thead class="bg-slate-50 text-slate-400 font-bold uppercase border-b"><tr><th class="p-6">Date</th><th>Ticker</th><th>Action</th><th>Shares</th><th>USD Value</th><th class="p-6 text-right">Delete</th></tr></thead><tbody id="list" class="divide-y text-slate-600"></tbody></table>
        </div>
    </div>

<script>
let trades = JSON.parse(localStorage.getItem("portfolio_v3.5") || "[]");
let irrChart = null, equityChart = null;
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";
const RATES = { USD: 1, HKD: 0.128, SGD: 0.74 }; 

async function getPrices() {
    try {
        const r = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).slice(1);
        let p = {};
        rows.forEach(row => {
            if(row.trim()) {
                const c = row.split(",");
                p[c[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(c[1]);
            }
        });
        document.getElementById('sync-indicator').innerText = "✅ DATA LIVE";
        return p;
    } catch(e) { return {}; }
}

function calculateXIRR(cfs) {
    if(cfs.length < 2) return NaN;
    let r = 0.1;
    for(let i=0; i<50; i++){
        let f=0, df=0;
        cfs.forEach(cf => {
            let t = (cf.d - cfs[0].d) / 31536000000;
            f += cf.a / Math.pow(1+r, t);
            df -= t * cf.a / Math.pow(1+r, t+1);
        });
        const nextR = r - f/df;
        if (Math.abs(nextR - r) < 0.0001) return nextR;
        r = nextR;
    }
    return r;
}

async function render() {
    const prices = await getPrices();
    const sortedTrades = trades.sort((a,b)=>new Date(a.date)-new Date(b.date));
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";

    let inv = {}, cfsUSD = [], equityPoints = [], irrPoints = [], spIrrPoints = [];
    let spAnnualRate = 0.105; // 标普500基准年化 (10.5%)

    sortedTrades.forEach((t, index) => {
        const amtUSD = t.shares * t.price * RATES[t.currency];
        const isBuy = t.type === 'BUY';
        if (isBuy) inv[t.ticker] = (inv[t.ticker] || 0) + t.shares;
        else inv[t.ticker] = (inv[t.ticker] || 0) - t.shares;
        
        cfsUSD.push({ d: new Date(t.date), a: isBuy ? -amtUSD : amtUSD });

        // 计算该时间节点的历史价值 (Simplified for graph)
        let tempMV = 0;
        for(let k in inv) if(inv[k]>0) tempMV += inv[k] * (prices[k] || t.price * RATES[t.currency]);
        equityPoints.push({ x: new Date(t.date), y: tempMV });

        // 计算该节点的 IRR
        if(index > 0) {
            const currentNodeIrr = calculateXIRR([...cfsUSD, { d: new Date(t.date), a: tempMV }]);
            irrPoints.push({ x: new Date(t.date), y: currentNodeIrr * 100 });
            spIrrPoints.push({ x: new Date(t.date), y: spAnnualRate * 100 });
        }

        tbody.innerHTML += `<tr class="hover:bg-slate-50 border-b"><td class="p-6 font-mono">${t.date}</td><td class="font-bold text-slate-800">${t.ticker}</td><td><span class="${isBuy?'text-emerald-500':'text-red-400'} font-bold">${t.type}</span></td><td>${t.shares}</td><td class="font-mono text-blue-600">$${amtUSD.toFixed(2)}</td><td class="p-6 text-right"><button onclick="del(${index})" class="text-slate-300 hover:text-red-500 font-bold">DEL</button></td></tr>`;
    });

    // 最新持仓标签与当前总值
    let currentMV = 0, tagsHTML = "";
    for (let k in inv) {
        if (inv[k] > 0) {
            const p = prices[k] || 0;
            const isHK = k.includes(".HK"), isSG = k.includes(".SI");
            const tickerRate = isHK ? RATES.HKD : (isSG ? RATES.SGD : RATES.USD);
            const currencySymbol = isHK ? "HK$" : (isSG ? "S$" : "$");
            currentMV += inv[k] * p * tickerRate;
            tagsHTML += `<div class="bg-slate-800 px-3 py-1.5 rounded-xl border border-slate-700 text-[10px] font-bold"><span class="text-slate-500 mr-2">${k}</span> ${currencySymbol}${p.toFixed(1)}</div>`;
        }
    }

    // 最终 IRR
    const finalYourIrr = calculateXIRR([...cfsUSD, { d: new Date(), a: currentMV }]);
    document.getElementById("total-val-usd").innerText = "$" + currentMV.toLocaleString(undefined, {minimumFractionDigits:2});
    document.getElementById("price-tags").innerHTML = tagsHTML;
    document.getElementById("irr-val").innerText = isNaN(finalYourIrr) ? "--%" : (finalYourIrr*100).toFixed(2) + "%";
    document.getElementById("sp500-irr-val").innerText = (spAnnualRate*100).toFixed(2) + "%";

    updateCharts(equityPoints, irrPoints, spIrrPoints, currentMV, finalYourIrr, spAnnualRate);
}

function updateCharts(eqPts, irrPts, spPts, lastMV, lastIrr, spRate) {
    const commonOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { type: 'time', grid: { display: false } }, y: { grid: { color: '#f8fafc' } } } };

    // Equity Chart
    if (equityChart) equityChart.destroy();
    equityChart = new Chart(document.getElementById('equityChart'), {
        type: 'line',
        data: { datasets: [{ label: 'Equity', data: [...eqPts, {x: new Date(), y: lastMV}], borderColor: '#0f172a', backgroundColor: 'rgba(15, 23, 42, 0.05)', fill: true, tension: 0.4, pointRadius: 0 }] },
        options: commonOpts
    });

    // IRR Comparison Chart
    if (irrChart) irrChart.destroy();
    irrChart = new Chart(document.getElementById('irrChart'), {
        type: 'line',
        data: { datasets: [
            { label: 'Your IRR', data: [...irrPts, {x: new Date(), y: lastIrr*100}], borderColor: '#2563eb', tension: 0.4, pointRadius: 2 },
            { label: 'S&P 500', data: [...spPts, {x: new Date(), y: spRate*100}], borderColor: '#10b981', borderDash: [5, 5], tension: 0, pointRadius: 0 }
        ]},
        options: { ...commonOpts, plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } } }
    });
}

function add() {
    const t = { date: document.getElementById("d").value, ticker: document.getElementById("tk").value.toUpperCase().trim(), currency: document.getElementById("curr").value, type: document.getElementById("type").value, shares: parseFloat(document.getElementById("sh").value), price: parseFloat(document.getElementById("pr").value) };
    if(t.date && t.ticker && t.shares) { trades.push(t); localStorage.setItem("portfolio_v3.5", JSON.stringify(trades)); render(); }
}
function del(i) { trades.splice(i, 1); localStorage.setItem("portfolio_v3.5", JSON.stringify(trades)); render(); }
document.getElementById('d').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
