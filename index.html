<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Portfolio vs S&P 500 Benchmark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800">
    <div class="max-w-6xl mx-auto bg-white p-6 md:p-10 rounded-3xl shadow-2xl border border-slate-100">
        <h1 class="text-2xl font-black mb-8 tracking-tight text-slate-900 border-b pb-4 flex justify-between items-center">
            <span>🌍 全球资产监控 <span class="text-blue-600 text-sm ml-2">Vs S&P 500</span></span>
            <span id="sync-indicator" class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-mono uppercase">Initialing...</span>
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="p-6 bg-slate-900 rounded-3xl text-white shadow-xl col-span-1 md:col-span-1">
                <p class="text-[10px] font-bold opacity-40 uppercase mb-1 tracking-widest text-center">Total Equity (USD)</p>
                <h2 id="total-val-usd" class="text-2xl font-mono font-bold tracking-tighter text-center">$--</h2>
                <div id="price-tags" class="mt-4 flex flex-wrap gap-2 justify-center"></div>
            </div>
            
            <div class="p-6 bg-blue-600 rounded-3xl text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-60 uppercase mb-1 tracking-widest text-center">Your IRR</p>
                <h2 id="irr-val" class="text-3xl font-mono font-bold tracking-tighter text-center">--%</h2>
                <p id="irr-msg" class="text-[9px] mt-2 text-center opacity-80 italic">Target: 17%</p>
            </div>

            <div class="p-6 bg-emerald-600 rounded-3xl text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-60 uppercase mb-1 tracking-widest text-center">S&P 500 IRR</p>
                <h2 id="sp500-irr" class="text-3xl font-mono font-bold tracking-tighter text-center">--%</h2>
                <p class="text-[9px] mt-2 text-center opacity-80 italic">Benchmark (IVV/VOO)</p>
            </div>

            <div class="p-6 bg-white border border-slate-100 rounded-3xl shadow-sm">
                <div class="space-y-2 font-mono text-[10px]">
                    <div class="flex justify-between border-b pb-1"><span>HKD/USD:</span><span id="rate-hkd">--</span></div>
                    <div class="flex justify-between border-b pb-1"><span>SGD/USD:</span><span id="rate-sgd">--</span></div>
                </div>
            </div>
        </div>

        <div class="mb-10 p-6 bg-slate-50 rounded-3xl border border-slate-100">
            <div class="h-[280px]"><canvas id="equityChart"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-2xl mb-10 border-2 border-blue-50 shadow-sm">
            <div class="grid grid-cols-2 md:grid-cols-7 gap-4 items-end">
                <div class="col-span-2 md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-1">DATE</label><input type="date" id="d" class="w-full border p-2 rounded-lg text-sm bg-slate-50 outline-none border-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">TICKER</label><input type="text" id="tk" placeholder="TCOM" class="w-full border p-2 rounded-lg text-sm font-bold uppercase outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">CURR</label><select id="curr" class="w-full border p-2 rounded-lg text-sm bg-white font-bold outline-none"><option value="USD">USD</option><option value="HKD">HKD</option><option value="SGD">SGD</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">ACTION</label><select id="type" class="w-full border p-2 rounded-lg text-sm bg-white font-bold outline-none"><option value="BUY">BUY</option><option value="SELL" class="text-red-500">SELL</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">SHARES</label><input type="number" id="sh" placeholder="100" class="w-full border p-2 rounded-lg text-sm outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">PRICE</label><input type="number" id="pr" placeholder="50.0" class="w-full border p-2 rounded-lg text-sm outline-none"></div>
                <button onclick="add()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-900 transition h-[38px] w-full">ADD</button>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-100">
            <table class="w-full text-left text-[11px]"><thead class="bg-slate-50 text-slate-400 font-bold uppercase"><tr class="border-b"><th class="p-4">Date</th><th>Ticker</th><th>Action</th><th>Shares</th><th>USD Amount</th><th class="p-4 text-right">Action</th></tr></thead><tbody id="list" class="divide-y text-slate-600"></tbody></table>
        </div>
    </div>

<script>
let trades = JSON.parse(localStorage.getItem("portfolio_v3.2") || "[]");
let chartInstance = null;
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";
const RATES = { USD: 1, HKD: 0.128, SGD: 0.74 }; 

async function getPrices() {
    try {
        const r = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).slice(1);
        let p = {};
        rows.forEach(row => {
            const c = row.split(",");
            if(c[0] && c[1]) p[c[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(c[1]);
        });
        document.getElementById('sync-indicator').innerText = "✅ SYNCED";
        return p;
    } catch(e) { return {}; }
}

function xirr(cfs) {
    if(cfs.length < 2) return NaN;
    let r = 0.1;
    for(let i=0; i<100; i++){
        let n=0, d=0;
        cfs.forEach(cf => {
            let t = (cf.d - cfs[0].d) / 31536000000;
            if (t <= 0) t = 0.000001; 
            n += cf.a / Math.pow(1+r, t);
            d -= t * cf.a / Math.pow(1+r, t+1);
        });
        const nextR = r - n/d;
        if (Math.abs(nextR - r) < 0.0001) return nextR;
        r = nextR;
    }
    return r;
}

async function render() {
    const prices = await getPrices();
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    document.getElementById('rate-hkd').innerText = RATES.HKD;
    document.getElementById('rate-sgd').innerText = RATES.SGD;

    let inv = {}, cfsUSD = [];
    const sp500_price_now = prices['IVV'] || prices['VOO'] || 520; // 备选：如果Sheet没写，默认520

    trades.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((t, i) => {
        const amtUSD = t.shares * t.price * RATES[t.currency];
        const isBuy = t.type === 'BUY';
        if (isBuy) inv[t.ticker] = (inv[t.ticker] || 0) + t.shares;
        else inv[t.ticker] = (inv[t.ticker] || 0) - t.shares;
        cfsUSD.push({ d: new Date(t.date), a: isBuy ? -amtUSD : amtUSD });
        
        tbody.innerHTML += `<tr class="hover:bg-slate-50 border-b text-[10px]"><td class="p-3 font-mono">${t.date}</td><td class="font-bold">${t.ticker}</td><td>${t.type}</td><td>${t.shares}</td><td class="font-mono text-blue-600">$${amtUSD.toFixed(2)}</td><td class="p-3 text-right"><button onclick="del(${i})" class="text-slate-300">DEL</button></td></tr>`;
    });

    let currentMV_USD = 0, tagsHTML = "";
    for (let k in prices) {
        if (inv[k] > 0) {
            const p = prices[k];
            const isHK = k.includes(".HK"), isSG = k.includes(".SI");
            const tickerRate = isHK ? RATES.HKD : (isSG ? RATES.SGD : RATES.USD);
            currentMV_USD += inv[k] * p * tickerRate;
            tagsHTML += `<div class="bg-slate-800 px-2 py-1 rounded text-[9px] border border-slate-700 font-mono text-white">${k}: $${(p * tickerRate).toFixed(2)}</div>`;
        }
    }

    // --- Benchmark 计算逻辑 ---
    // 假设同样的资金在同样的时间点买入 S&P 500 (以 IVV 为例)
    // 简化版：我们假设 S&P 500 的年化增长率为 10% (或者你可以从 Sheet 抓取 IVV 价格)
    const sp500_annual_rate = 0.10; 
    let sp500_final_value = 0;
    cfsUSD.forEach(cf => {
        const years = (new Date() - cf.d) / 31536000000;
        sp500_final_value += Math.abs(cf.a) * Math.pow(1 + sp500_annual_rate, years) * (cf.a < 0 ? 1 : -1);
    });
    
    const your_irr = xirr([...cfsUSD, { d: new Date(), a: currentMV_USD }]);
    const sp500_irr = 0.102; // 此处可根据历史数据调优

    document.getElementById("total-val-usd").innerText = "$" + currentMV_USD.toLocaleString(undefined, {minimumFractionDigits:2});
    document.getElementById("price-tags").innerHTML = tagsHTML;
    document.getElementById("irr-val").innerText = isNaN(your_irr) ? "--%" : (your_irr*100).toFixed(2) + "%";
    document.getElementById("sp500-irr").innerText = (sp500_irr*100).toFixed(2) + "%";
    
    updateChart(cfsUSD, currentMV_USD, sp500_annual_rate);
}

function updateChart(cfs, currentMV, spRate) {
    const ctx = document.getElementById('equityChart').getContext('2d');
    let runningSum = 0, spSum = 0;
    const dataPoints = [], spPoints = [];

    cfs.forEach(cf => {
        runningSum += Math.abs(cf.a);
        spSum += Math.abs(cf.a);
        dataPoints.push({ x: cf.d, y: runningSum });
        spPoints.push({ x: cf.d, y: spSum });
    });
    
    dataPoints.push({ x: new Date(), y: currentMV });
    // 模拟 S&P 500 的终点
    const spFinal = spSum * Math.pow(1 + spRate, (new Date() - cfs[0].d)/31536000000);
    spPoints.push({ x: new Date(), y: spFinal });

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [
                { label: 'Your Portfolio', data: dataPoints, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', fill: true, tension: 0.3 },
                { label: 'S&P 500 Benchmark', data: spPoints, borderColor: '#10b981', borderDash: [5, 5], fill: false, tension: 0.3 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: { type: 'time', time: { unit: 'month' } }, y: { beginAtZero: false } },
            plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
        }
    });
}

function add() {
    const t = {
        date: document.getElementById("d").value,
        ticker: document.getElementById("tk").value.toUpperCase().trim(),
        currency: document.getElementById("curr").value,
        type: document.getElementById("type").value,
        shares: parseFloat(document.getElementById("sh").value),
        price: parseFloat(document.getElementById("pr").value)
    };
    if(t.date && t.ticker) {
        trades.push(t);
        localStorage.setItem("portfolio_v3.2", JSON.stringify(trades));
        render();
    }
}
function del(i) { trades.splice(i, 1); localStorage.setItem("portfolio_v3.2", JSON.stringify(trades)); render(); }
document.getElementById('d').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
