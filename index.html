<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>投资 IRR 实战看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h1 class="text-2xl font-bold mb-4">📈 我的投资 IRR 监控 (实时同步)</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div class="p-4 bg-blue-50 rounded-lg border border-blue-200">
                    <p class="text-sm text-blue-600 font-bold">当前持仓估值 (实时)</p>
                    <h2 id="totalValueDisplay" class="text-3xl font-mono">￥0.00</h2>
                </div>
                <div class="p-4 bg-green-50 rounded-lg border border-green-200">
                    <p class="text-sm text-green-600 font-bold">年化 IRR (对标 17%)</p>
                    <h2 id="irrDisplay" class="text-3xl font-mono text-gray-800">0.00%</h2>
                </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 p-4 bg-gray-50 rounded border">
                <input type="date" id="date" class="border p-2 rounded">
                <input type="text" id="ticker" placeholder="代码(TCOM)" class="border p-2 rounded w-24 uppercase">
                <select id="type" class="border p-2 rounded">
                    <option value="BUY">买入 (-)</option>
                    <option value="SELL">卖出 (+)</option>
                </select>
                <input type="number" id="shares" placeholder="股数" class="border p-2 rounded w-20">
                <input type="number" id="price" placeholder="单价" class="border p-2 rounded w-24">
                <button onclick="addTrade()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">添加交易</button>
            </div>

            <table class="w-full text-left text-sm">
                <thead>
                    <tr class="border-b">
                        <th class="py-2">日期</th>
                        <th>代码</th>
                        <th>动作</th>
                        <th>金额</th>
                        <th>股数</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tradeList"></tbody>
            </table>
        </div>
    </div>

<script>
let trades = JSON.parse(localStorage.getItem("my_trades_v4") || "[]");
// 这是你的 CSV 链接
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";

function addTrade() {
    const t = {
        id: Date.now(),
        date: document.getElementById("date").value,
        ticker: document.getElementById("ticker").value.toUpperCase().trim(),
        type: document.getElementById("type").value,
        shares: parseFloat(document.getElementById("shares").value),
        price: parseFloat(document.getElementById("price").value)
    };
    if(!t.date || !t.ticker || isNaN(t.price)) return alert("请检查输入");
    trades.push(t);
    saveAndRender();
}

function deleteTrade(id) {
    trades = trades.filter(t => t.id !== id);
    saveAndRender();
}

function saveAndRender() {
    localStorage.setItem("my_trades_v4", JSON.stringify(trades));
    render();
}

// 高精度 XIRR 计算器
function calculateXIRR(cashflows) {
    if (cashflows.length < 2) return 0;
    let rate = 0.1;
    for (let i = 0; i < 50; i++) {
        let npv = 0, dnpv = 0;
        for (let cf of cashflows) {
            let t = (cf.date - cashflows[0].date) / (365 * 24 * 3600 * 1000);
            let factor = Math.pow(1 + rate, t);
            npv += cf.amount / factor;
            dnpv -= t * cf.amount / (factor * (1 + rate));
        }
        let nextRate = rate - npv / dnpv;
        if (Math.abs(nextRate - rate) < 0.0001) return nextRate;
        rate = nextRate;
    }
    return rate;
}

async function render() {
    const list = document.getElementById("tradeList");
    list.innerHTML = "";
    trades.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
        list.innerHTML += `<tr class="border-b text-gray-700">
            <td class="py-2">${t.date}</td>
            <td class="font-bold">${t.ticker}</td>
            <td class="${t.type === 'BUY' ? 'text-red-500' : 'text-green-500'}">${t.type === 'BUY' ? '买入' : '卖出'}</td>
            <td>${(t.shares * t.price).toLocaleString()}</td>
            <td>${t.shares}</td>
            <td><button onclick="deleteTrade(${t.id})" class="text-gray-400 hover:text-red-500">删除</button></td>
        </tr>`;
    });

    // 1. 获取实时价格
    let livePrices = {};
    try {
        const res = await fetch(CSV_URL);
        const csv = await res.text();
        const rows = csv.split(/\r?\n/).slice(1);
        rows.forEach(row => {
            const cols = row.split(",");
            if(cols[0] && cols[1]) {
                livePrices[cols[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(cols[1].replace(/"/g,'').trim());
            }
        });
    } catch (e) { console.error("无法获取实时价格，请通过 GitHub Pages 访问"); }

    // 2. 统计持仓和历史现金流
    let inventory = {};
    let historyCfs = trades.map(t => ({
        date: new Date(t.date),
        amount: t.type === 'BUY' ? -(t.shares * t.price) : (t.shares * t.price)
    }));

    trades.forEach(t => {
        inventory[t.ticker] = (inventory[t.ticker] || 0) + (t.type === 'BUY' ? t.shares : -t.shares);
    });

    // 3. 计算“未卖出”部分的当前价值
    let currentPortfolioValue = 0;
    for (let ticker in inventory) {
        if (inventory[ticker] > 0) {
            const price = livePrices[ticker] || 0;
            currentPortfolioValue += inventory[ticker] * price;
        }
    }

    // 4. 将当前价值作为“今天的虚拟卖出”加入现金流
    const finalCfs = [...historyCfs, { date: new Date(), amount: currentPortfolioValue }];
    const irr = calculateXIRR(finalCfs.sort((a,b) => a.date - b.date));

    // 5. 显示
    document.getElementById("totalValueDisplay").innerText = "￥" + currentPortfolioValue.toLocaleString(undefined, {minimumFractionDigits:2});
    const irrEl = document.getElementById("irrDisplay");
    irrEl.innerText = (irr * 100).toFixed(2) + "%";
    irrEl.className = `text-3xl font-mono ${irr >= 0.17 ? 'text-green-600' : 'text-red-500'}`;
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
