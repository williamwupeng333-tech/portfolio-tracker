<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Portfolio Tracker V3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800 font-sans">
    <div class="max-w-6xl mx-auto bg-white p-6 md:p-10 rounded-3xl shadow-2xl border border-slate-100">
        <h1 class="text-2xl font-black mb-8 tracking-tight text-slate-900 border-b pb-4 flex justify-between items-center">
            <span>🌍 全球资产监控 <span class="text-blue-600 text-sm ml-2">Base: USD</span></span>
            <span id="sync-indicator" class="text-[10px] bg-slate-100 text-slate-500 px-3 py-1 rounded-full font-mono uppercase tracking-widest">Initialing...</span>
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="p-8 bg-slate-900 rounded-3xl text-white shadow-xl flex flex-col justify-between">
                <div>
                    <p class="text-xs font-bold opacity-40 uppercase mb-1 tracking-widest">Total Equity (USD)</p>
                    <h2 id="total-val-usd" class="text-4xl font-mono font-bold tracking-tighter">$--</h2>
                </div>
                <div id="price-tags" class="mt-6 flex flex-wrap gap-2"></div>
            </div>
            
            <div class="p-8 bg-blue-600 rounded-3xl text-white shadow-xl flex flex-col justify-between">
                <div>
                    <p class="text-xs font-bold opacity-60 uppercase mb-1 tracking-widest">Annualized IRR</p>
                    <h2 id="irr-val" class="text-4xl font-mono font-bold tracking-tighter">--%</h2>
                </div>
                <p id="irr-msg" class="text-[10px] mt-4 font-medium bg-blue-700/50 p-2 rounded-lg"></p>
            </div>

            <div class="p-8 bg-white border border-slate-100 rounded-3xl shadow-sm flex flex-col justify-between">
                <p class="text-xs font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Live FX Rates (vs USD)</p>
                <div class="space-y-3 font-mono text-sm">
                    <div class="flex justify-between border-b pb-2"><span>HKD/USD:</span><span id="rate-hkd" class="font-bold text-blue-600">--</span></div>
                    <div class="flex justify-between border-b pb-2"><span>SGD/USD:</span><span id="rate-sgd" class="font-bold text-blue-600">--</span></div>
                </div>
            </div>
        </div>

        <div class="mb-10 p-6 bg-slate-50 rounded-3xl border border-slate-100">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Equity Growth Curve (USD)</p>
            <div class="h-[250px]"><canvas id="equityChart"></canvas></div>
        </div>

        <div class="bg-white p-6 rounded-2xl mb-10 border-2 border-blue-50 shadow-sm">
            <p class="text-[10px] font-bold text-blue-400 uppercase mb-4 tracking-widest">New Transaction</p>
            <div class="grid grid-cols-2 md:grid-cols-7 gap-4 items-end">
                <div class="col-span-2 md:col-span-1"><label class="text-[10px] font-bold text-slate-400 block mb-1">DATE</label><input type="date" id="d" class="w-full border p-2 rounded-lg text-sm bg-slate-50 outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">TICKER</label><input type="text" id="tk" placeholder="TCOM" class="w-full border p-2 rounded-lg text-sm font-bold uppercase outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">CURRENCY</label><select id="curr" class="w-full border p-2 rounded-lg text-sm bg-white font-bold outline-none"><option value="USD">USD</option><option value="HKD">HKD</option><option value="SGD">SGD</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">ACTION</label><select id="type" class="w-full border p-2 rounded-lg text-sm bg-white font-bold outline-none"><option value="BUY">BUY (+)</option><option value="SELL" class="text-red-500">SELL (-)</option></select></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">SHARES</label><input type="number" id="sh" placeholder="100" class="w-full border p-2 rounded-lg text-sm outline-none"></div>
                <div><label class="text-[10px] font-bold text-slate-400 block mb-1">UNIT PRICE</label><input type="number" id="pr" placeholder="50.0" class="w-full border p-2 rounded-lg text-sm outline-none"></div>
                <button onclick="add()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-slate-900 transition h-[38px] w-full shadow-lg shadow-blue-200">ADD</button>
            </div>
        </div>

        <div class="overflow-hidden rounded-2xl border border-slate-100">
            <table class="w-full text-left text-[11px]"><thead class="bg-slate-50 text-slate-400 font-bold uppercase"><tr class="border-b"><th class="p-4">Date</th><th>Ticker</th><th>Cur</th><th>Action</th><th>Shares</th><th>Raw Price</th><th>USD Amount</th><th class="p-4 text-right">Action</th></tr></thead><tbody id="list" class="divide-y text-slate-600"></tbody></table>
        </div>
    </div>

<script>
let trades = JSON.parse(localStorage.getItem("portfolio_v3.1") || "[]");
let chartInstance = null;

// Google Sheets CSV 链接
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";

// 汇率（可在此手动调整或从 Sheet 获取）
const RATES = { USD: 1, HKD: 0.128, SGD: 0.74 }; 

async function getPrices() {
    try {
        const r = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).slice(1);
        let p = {};
        rows.forEach(row => {
            const c = row.split(",");
            if(c[0] && c[1]) p[c[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(c[1]);
        });
        document.getElementById('sync-indicator').innerText = "✅ LIVE SYNCED";
        return p;
    } catch(e) {
        document.getElementById('sync-indicator').innerText = "⚠️ OFFLINE MODE";
        return {};
    }
}

function xirr(cfs) {
    if(cfs.length < 2) return NaN;
    let r = 0.1;
    for(let i=0; i<100; i++){
        let n=0, d=0;
        cfs.forEach(cf => {
            let t = (cf.d - cfs[0].d) / 31536000000;
            if (t <= 0) t = 0.000001; 
            n += cf.a / Math.pow(1+r, t);
            d -= t * cf.a / Math.pow(1+r, t+1);
        });
        const nextR = r - n/d;
        if (Math.abs(nextR - r) < 0.0001) return nextR;
        r = nextR;
    }
    return r;
}

async function render() {
    const prices = await getPrices();
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    document.getElementById('rate-hkd').innerText = RATES.HKD;
    document.getElementById('rate-sgd').innerText = RATES.SGD;

    let inv = {}, cfsUSD = [], historyMV = [];
    
    trades.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((t, i) => {
        const rate = RATES[t.currency || 'USD'];
        const amtUSD = t.shares * t.price * rate;
        
        if (t.type === 'BUY') {
            inv[t.ticker] = (inv[t.ticker] || 0) + t.shares;
            cfsUSD.push({ d: new Date(t.date), a: -amtUSD });
        } else {
            inv[t.ticker] = (inv[t.ticker] || 0) - t.shares;
            cfsUSD.push({ d: new Date(t.date), a: amtUSD });
        }
        
        tbody.innerHTML += `<tr class="hover:bg-slate-50 transition border-b"><td class="p-4 font-mono">${t.date}</td><td class="font-bold text-slate-800">${t.ticker}</td><td>${t.currency}</td><td><span class="${t.type==='BUY'?'text-emerald-500':'text-red-400'} font-bold">${t.type}</span></td><td>${t.shares}</td><td>${t.price}</td><td class="font-mono text-blue-600">$${amtUSD.toFixed(2)}</td><td class="p-4 text-right"><button onclick="del(${i})" class="text-slate-300 hover:text-red-500 font-bold">DEL</button></td></tr>`;
    });

    let currentMV_USD = 0, tagsHTML = "";
    for (let k in prices) {
        const p = prices[k];
        const holding = inv[k] || 0;
        if (holding > 0) {
            const isHK = k.includes(".HK");
            const isSG = k.includes(".SI");
            const tickerRate = isHK ? RATES.HKD : (isSG ? RATES.SGD : RATES.USD);
            const currencySymbol = isHK ? "HK$" : (isSG ? "S$" : "$");

            currentMV_USD += holding * p * tickerRate;
            tagsHTML += `<div class="bg-slate-800 px-3 py-1.5 rounded-lg border border-slate-700 flex items-center shadow-sm">
                <span class="text-slate-500 font-black mr-2 text-[9px]">${k}</span>
                <span class="text-white font-mono font-bold">${currencySymbol}${p.toFixed(2)}</span>
            </div>`;
        }
    }

    const finalCfs = [...cfsUSD, { d: new Date(), a: currentMV_USD }];
    const res = xirr(finalCfs.sort((a,b)=>a.d - b.d));
    
    document.getElementById("total-val-usd").innerText = "$" + currentMV_USD.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById("price-tags").innerHTML = tagsHTML;
    document.getElementById("irr-val").innerText = isNaN(res) ? "--%" : (res*100).toFixed(2) + "%";
    document.getElementById("irr-msg").innerText = res >= 0.17 ? "🎯 SUCCESS: Goal reached!" : "STAY CALM: Chasing 17% IRR...";
    
    updateChart(cfsUSD, currentMV_USD);
}

function updateChart(cfs, currentMV) {
    const ctx = document.getElementById('equityChart').getContext('2d');
    let runningSum = 0;
    const dataPoints = cfs.map(cf => {
        runningSum += Math.abs(cf.a); 
        return { x: cf.d, y: runningSum };
    });
    dataPoints.push({ x: new Date(), y: currentMV });

    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Portfolio Value (USD)',
                data: dataPoints,
                borderColor: '#3b82f6',
                borderWidth: 3,
                pointRadius: 0,
                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                fill: true,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { 
                x: { type: 'time', time: { unit: 'month' }, grid: { display: false } }, 
                y: { beginAtZero: true, grid: { color: '#f1f5f9' } } 
            },
            plugins: { legend: { display: false } }
        }
    });
}

function add() {
    const t = {
        date: document.getElementById("d").value,
        ticker: document.getElementById("tk").value.toUpperCase().trim(),
        currency: document.getElementById("curr").value,
        type: document.getElementById("type").value,
        shares: parseFloat(document.getElementById("sh").value),
        price: parseFloat(document.getElementById("pr").value)
    };
    if(t.date && t.ticker && !isNaN(t.shares)) {
        trades.push(t);
        localStorage.setItem("portfolio_v3.1", JSON.stringify(trades));
        render();
    }
}

function del(i) { trades.splice(i, 1); localStorage.setItem("portfolio_v3.1", JSON.stringify(trades)); render(); }

document.getElementById('d').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
