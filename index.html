<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
        <h1 class="text-2xl font-black mb-6 tracking-tight text-slate-900 border-b pb-4">📊 投资看板 <span class="text-blue-500">Live</span></h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="p-6 bg-slate-900 rounded-2xl text-white shadow-lg">
                <p class="text-xs font-bold opacity-50 uppercase mb-1">当前持仓实时市值</p>
                <h2 id="total-val" class="text-3xl font-mono font-bold tracking-tighter">￥0.00</h2>
                <div id="price-tags" class="mt-3 flex flex-wrap gap-2"></div>
            </div>
            <div class="p-6 bg-blue-600 rounded-2xl text-white shadow-lg">
                <p class="text-xs font-bold opacity-70 uppercase mb-1">年化 IRR (17% 目标)</p>
                <h2 id="irr-val" class="text-3xl font-mono font-bold tracking-tighter">--%</h2>
                <p id="irr-msg" class="text-[10px] mt-2 font-medium opacity-80"></p>
            </div>
        </div>

        <div class="bg-slate-50 p-4 rounded-xl mb-8 flex flex-wrap gap-2 items-end border border-slate-200">
            <div class="flex-1 min-w-[120px]"><label class="text-[10px] font-bold text-slate-400">日期</label><input type="date" id="d" class="w-full border p-2 rounded-lg text-sm"></div>
            <div class="flex-1 min-w-[100px]"><label class="text-[10px] font-bold text-slate-400">代码</label><input type="text" id="tk" placeholder="TCOM" class="w-full border p-2 rounded-lg text-sm uppercase"></div>
            <div class="flex-1 min-w-[80px]"><label class="text-[10px] font-bold text-slate-400">股数</label><input type="number" id="sh" placeholder="100" class="w-full border p-2 rounded-lg text-sm"></div>
            <div class="flex-1 min-w-[80px]"><label class="text-[10px] font-bold text-slate-400">单价</label><input type="number" id="pr" placeholder="50.0" class="w-full border p-2 rounded-lg text-sm"></div>
            <button onclick="add()" class="bg-slate-900 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 transition h-[38px]">记录</button>
        </div>

        <div class="overflow-x-auto"><table class="w-full text-left text-xs"><thead class="border-b text-slate-400 uppercase font-bold"><tr class="p-2"><th>日期</th><th>代码</th><th>数量</th><th>成交价</th><th>操作</th></tr></thead><tbody id="list" class="divide-y"></tbody></table></div>

        <div id="status" class="mt-10 p-3 bg-slate-100 rounded-lg text-[10px] font-mono text-slate-400">状态：等待同步...</div>
    </div>

<script>
// 这里用一个新的 Key，防止旧数据干扰
let trades = JSON.parse(localStorage.getItem("tr_v99") || "[]");

// ⚠️ 注意：这里先留空，等你在 Google Sheets 重新发布后再填入
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv"; 

async function getPrices() {
    if (!CSV_URL.includes("http")) {
        document.getElementById('status').innerText = "❌ 错误：请在代码中填入正确的 Google Sheets CSV 链接";
        return {};
    }
    try {
        const r = await fetch(CSV_URL + "&cache=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).slice(1);
        let p = {};
        rows.forEach(row => {
            const c = row.split(",");
            if(c[0] && c[1]) p[c[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(c[1]);
        });
        document.getElementById('status').innerText = "✅ 股价同步成功：" + Object.keys(p).join(", ");
        return p;
    } catch(e) {
        document.getElementById('status').innerText = "❌ 同步失败：请确保使用 HTTPS 链接访问，并检查 CSV 是否重新发布";
        return {};
    }
}

function xirr(cfs) {
    if(cfs.length < 2) return 0;
    let r = 0.1;
    for(let i=0; i<60; i++){
        let n=0, d=0;
        cfs.forEach(cf => {
            let t = (cf.d - cfs[0].d) / 31536000000;
            if (t <= 0) t = 0.000001; // 防止日期重叠导致的 NaN
            n += cf.a / Math.pow(1+r, t);
            d -= t * cf.a / Math.pow(1+r, t+1);
        });
        r -= n/d;
    }
    return r;
}

async function render() {
    const prices = await getPrices();
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    
    let inv = {}, cfs = [];
    trades.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((t, i) => {
        inv[t.ticker] = (inv[t.ticker] || 0) + t.shares;
        cfs.push({ d: new Date(t.date), a: -(t.shares * t.price) });
        tbody.innerHTML += `<tr class="hover:bg-slate-50 transition"><td class="py-3 font-mono text-slate-500">${t.date}</td><td class="font-bold text-slate-900">${t.ticker}</td><td>${t.shares}</td><td class="font-mono">￥${t.price.toFixed(2)}</td><td><button onclick="del(${i})" class="text-slate-300 hover:text-red-500">删除</button></td></tr>`;
    });

    let mv = 0, tags = "";
    for(let k in inv) {
        if(inv[k] > 0) {
            const p = prices[k] || 0;
            mv += inv[k] * p;
            tags += `<span class="bg-slate-800 text-white px-2 py-1 rounded text-[10px] font-bold border border-slate-700">${k}: ￥${p.toFixed(2)}</span>`;
        }
    }

    const finalCfs = [...cfs, { d: new Date(), a: mv }];
    const res = xirr(finalCfs.sort((a,b)=>a.d - b.d));
    
    document.getElementById("total-val").innerText = "￥" + mv.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById("price-tags").innerHTML = tags;
    document.getElementById("irr-val").innerText = (res*100).toFixed(2) + "%";
    document.getElementById("irr-msg").innerText = res >= 0.17 ? "🎉 已超越 17% 目标回报" : "尚未达到 17% 年化目标";
}

function add() {
    const t = {
        date: document.getElementById("d").value,
        ticker: document.getElementById("tk").value.toUpperCase().trim(),
        shares: parseFloat(document.getElementById("sh").value),
        price: parseFloat(document.getElementById("pr").value)
    };
    if(t.date && t.ticker && !isNaN(t.shares)) {
        trades.push(t);
        localStorage.setItem("tr_v99", JSON.stringify(trades));
        render();
    } else { alert("请填写完整信息"); }
}

function del(i) { trades.splice(i, 1); localStorage.setItem("tr_v99", JSON.stringify(trades)); render(); }

document.getElementById('d').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
