<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Portfolio Tracker Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-10 text-slate-800">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
        <h1 class="text-2xl font-black mb-6 tracking-tight text-slate-900 border-b pb-4 flex items-center">
            <span class="mr-2">📊</span> 投资看板 <span class="ml-2 text-blue-500 text-sm font-bold bg-blue-50 px-2 py-1 rounded">V2.0 LIVE</span>
        </h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="p-6 bg-slate-900 rounded-2xl text-white shadow-lg">
                <p class="text-xs font-bold opacity-50 uppercase mb-1 tracking-widest">当前持仓实时总市值</p>
                <h2 id="total-val" class="text-4xl font-mono font-bold tracking-tighter mb-4">￥0.00</h2>
                
                <div class="pt-4 border-t border-slate-700">
                    <p class="text-[10px] font-bold text-slate-500 mb-3 uppercase tracking-widest flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse mr-2"></span>
                        Google Sheets 实时报价看板
                    </p>
                    <div id="price-tags" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <div class="p-6 bg-blue-600 rounded-2xl text-white shadow-lg relative overflow-hidden">
                <p class="text-xs font-bold opacity-70 uppercase mb-1 tracking-widest">年化 IRR (基于实时价)</p>
                <h2 id="irr-val" class="text-4xl font-mono font-bold tracking-tighter relative z-10">--%</h2>
                <p id="irr-msg" class="text-[10px] mt-2 font-medium opacity-80 relative z-10"></p>
                <div class="absolute right-[-20px] bottom-[-20px] text-white opacity-10 text-8-xl font-black italic select-none">17%</div>
            </div>
        </div>

        <div class="bg-slate-50 p-6 rounded-2xl mb-8 border border-slate-200 shadow-inner">
            <div class="grid grid-cols-2 md:grid-cols-6 gap-4 items-end">
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">日期</label>
                    <input type="date" id="d" class="w-full border-slate-200 border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">代码</label>
                    <input type="text" id="tk" placeholder="TCOM" class="w-full border-slate-200 border p-2 rounded-lg text-sm uppercase font-bold focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="col-span-2 md:col-span-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">交易类型</label>
                    <select id="type" class="w-full border-slate-200 border p-2 rounded-lg text-sm font-bold bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="BUY">买入 (+)</option>
                        <option value="SELL" class="text-red-500">卖出 (-)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">股数</label>
                    <input type="number" id="sh" placeholder="100" class="w-full border-slate-200 border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">单价</label>
                    <input type="number" id="pr" placeholder="50.0" class="w-full border-slate-200 border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="add()" class="bg-slate-900 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-600 transition shadow-lg h-[40px] w-full col-span-2 md:col-span-1">
                    添加记录
                </button>
            </div>
        </div>

        <div class="overflow-hidden rounded-xl border border-slate-100 shadow-sm">
            <table class="w-full text-left text-xs">
                <thead class="bg-slate-50 text-slate-400 uppercase font-bold border-b">
                    <tr>
                        <th class="p-4">日期</th>
                        <th>代码</th>
                        <th>动作</th>
                        <th>数量</th>
                        <th>价格</th>
                        <th>总额</th>
                        <th class="text-right p-4">操作</th>
                    </tr>
                </thead>
                <tbody id="list" class="divide-y text-slate-600 bg-white">
                    </tbody>
            </table>
        </div>

        <div id="status" class="mt-8 p-3 bg-slate-50 rounded-lg text-[10px] font-mono text-slate-400 flex justify-between items-center">
            <span>系统状态：等待数据同步...</span>
            <span class="opacity-50">Data Source: Google Sheets CSV</span>
        </div>
    </div>

<script>
// 使用全新的 Key 确保存储结构不冲突
let trades = JSON.parse(localStorage.getItem("portfolio_v2") || "[]");

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";

async function getPrices() {
    try {
        const r = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await r.text();
        const rows = text.split(/\r?\n/).slice(1);
        let p = {};
        rows.forEach(row => {
            const c = row.split(",");
            if(c[0] && c[1]) p[c[0].replace(/"/g,'').trim().toUpperCase()] = parseFloat(c[1]);
        });
        document.getElementById('status').firstElementChild.innerText = "✅ 股价同步成功: " + Object.keys(p).join(", ");
        return p;
    } catch(e) {
        document.getElementById('status').firstElementChild.innerText = "❌ 同步失败: 请检查网络或 CSV 链接";
        return {};
    }
}

function xirr(cfs) {
    if(cfs.length < 2) return NaN;
    let r = 0.1;
    for(let i=0; i<100; i++){
        let n=0, d=0;
        cfs.forEach(cf => {
            let t = (cf.d - cfs[0].d) / 31536000000;
            if (t <= 0) t = 0.00001; 
            n += cf.a / Math.pow(1+r, t);
            d -= t * cf.a / Math.pow(1+r, t+1);
        });
        const nextR = r - n/d;
        if (Math.abs(nextR - r) < 0.0001) return nextR;
        r = nextR;
    }
    return r;
}

async function render() {
    const prices = await getPrices();
    const tbody = document.getElementById("list");
    tbody.innerHTML = "";
    
    let inv = {}, cfs = [];
    
    // 处理交易历史
    trades.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach((t, i) => {
        const amount = t.shares * t.price;
        if (t.type === 'BUY') {
            inv[t.ticker] = (inv[t.ticker] || 0) + t.shares;
            cfs.push({ d: new Date(t.date), a: -amount });
        } else {
            inv[t.ticker] = (inv[t.ticker] || 0) - t.shares;
            cfs.push({ d: new Date(t.date), a: amount });
        }
        
        tbody.innerHTML += `
            <tr class="hover:bg-slate-50 transition">
                <td class="p-4 font-mono">${t.date}</td>
                <td class="font-bold text-slate-900">${t.ticker}</td>
                <td><span class="px-2 py-0.5 rounded-full ${t.type==='BUY'?'bg-emerald-100 text-emerald-700':'bg-red-100 text-red-700'} text-[10px] font-bold">${t.type === 'BUY' ? '买入' : '卖出'}</span></td>
                <td>${t.shares}</td>
                <td class="font-mono text-slate-400">￥${t.price.toFixed(2)}</td>
                <td class="font-mono font-bold">￥${amount.toFixed(2)}</td>
                <td class="text-right p-4"><button onclick="del(${i})" class="text-slate-300 hover:text-red-500 font-bold">删除</button></td>
            </tr>`;
    });

    // 股价看板：显示 Google Sheet 里的所有股票
    let currentMV = 0, tagsHTML = "";
    for (let ticker in prices) {
        const p = prices[ticker];
        const holding = inv[ticker] || 0;
        const isHolding = holding > 0;
        
        tagsHTML += `
            <div class="flex items-center bg-slate-800 rounded-lg px-3 py-1.5 border ${isHolding ? 'border-blue-500 bg-slate-700' : 'border-slate-700'} transition shadow-sm">
                <span class="text-[10px] font-black text-slate-400 mr-2">${ticker}</span>
                <span class="text-sm font-mono font-bold text-white">￥${p.toFixed(2)}</span>
                ${isHolding ? `<span class="ml-2 text-[9px] text-blue-400 bg-blue-900/50 px-1 rounded">${holding}股</span>` : ''}
            </div>`;
        
        if (isHolding) currentMV += holding * p;
    }

    // 计算 IRR (历史流 + 当前残值)
    const finalCfs = [...cfs, { d: new Date(), a: currentMV }];
    const res = xirr(finalCfs.sort((a,b)=>a.d - b.d));
    const irrStr = isNaN(res) ? "计算中..." : (res*100).toFixed(2) + "%";
    
    document.getElementById("total-val").innerText = "￥" + currentMV.toLocaleString(undefined, {minimumFractionDigits: 2});
    document.getElementById("price-tags").innerHTML = tagsHTML;
    document.getElementById("irr-val").innerText = irrStr;
    document.getElementById("irr-msg").innerText = res >= 0.17 ? "🎯 目标达成：已超越 17% 年化回报" : "尚未达到 17% 年化目标";
}

function add() {
    const t = {
        date: document.getElementById("d").value,
        ticker: document.getElementById("tk").value.toUpperCase().trim(),
        type: document.getElementById("type").value,
        shares: parseFloat(document.getElementById("sh").value),
        price: parseFloat(document.getElementById("pr").value)
    };
    if(t.date && t.ticker && !isNaN(t.shares)) {
        trades.push(t);
        localStorage.setItem("portfolio_v2", JSON.stringify(trades));
        render();
    } else { alert("请填写完整交易信息"); }
}

function del(i) { trades.splice(i, 1); localStorage.setItem("portfolio_v2", JSON.stringify(trades)); render(); }

// 初始化日期为今天
document.getElementById('d').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
