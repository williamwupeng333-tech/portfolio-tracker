<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Portfolio IRR & Live Query</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center text-slate-700">
                🔍 股价实时查询 (数据源: Google Sheets)
            </h2>
            <div class="flex gap-2">
                <input type="text" id="queryTicker" placeholder="输入代码 (如: 9961.HK)" class="border p-2 rounded-lg flex-1 uppercase font-mono">
                <button onclick="queryLivePrice()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition">查询实时价</button>
            </div>
            <div id="queryResult" class="mt-4 p-3 rounded-lg bg-slate-100 hidden flex justify-between items-center">
                <span id="resTicker" class="font-bold text-slate-700"></span>
                <span id="resPrice" class="text-2xl font-mono text-indigo-600 font-bold"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-sm">当前持仓实时总市值</p>
                <h2 id="totalValue" class="text-2xl font-bold text-slate-800">￥0.00</h2>
            </div>
            <div class="bg-indigo-600 p-6 rounded-2xl shadow-lg text-white">
                <p class="opacity-80 text-sm font-bold">年化 IRR (对标 17% 目标)</p>
                <h2 id="irrDisplay" class="text-4xl font-bold">0.00%</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-slate-400 text-sm">状态更新</p>
                <p id="syncStatus" class="text-sm font-medium text-emerald-500 flex items-center mt-2">● 已同步最新价格</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <div class="grid grid-cols-2 md:grid-cols-6 gap-3">
                <input type="date" id="date" class="border p-2 rounded text-sm">
                <input type="text" id="ticker" placeholder="代码" class="border p-2 rounded text-sm uppercase">
                <select id="type" class="border p-2 rounded text-sm">
                    <option value="BUY">买入 (-)</option>
                    <option value="SELL">卖出 (+)</option>
                </select>
                <input type="number" id="shares" placeholder="股数" class="border p-2 rounded text-sm">
                <input type="number" id="price" placeholder="单价" class="border p-2 rounded text-sm">
                <button onclick="addTrade()" class="bg-slate-800 text-white rounded text-sm font-bold hover:bg-black transition">记录交易</button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-100 text-sm">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr>
                        <th class="p-4 text-slate-500 font-medium">日期</th>
                        <th class="p-4 text-slate-500 font-medium">代码</th>
                        <th class="p-4 text-slate-500 font-medium">类型</th>
                        <th class="p-4 text-slate-500 font-medium">股数</th>
                        <th class="p-4 text-slate-500 font-medium">成交价</th>
                        <th class="p-4 text-slate-500 font-medium">操作</th>
                    </tr>
                </thead>
                <tbody id="tradeBody"></tbody>
            </table>
        </div>
    </div>

<script>
let trades = JSON.parse(localStorage.getItem("my_trades_v5") || "[]");
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSBHrRHu4C_g6B_aYFSpgPs7uAYGgE4IRlsTa6auBceGHDxEaFO_9yScwF0yoT4cX117cjXI2QeFOIU/pub?gid=0&single=true&output=csv";

// 1. 实时价格查询功能
async function queryLivePrice() {
    const ticker = document.getElementById("queryTicker").value.toUpperCase().trim();
    if (!ticker) return;
    
    document.getElementById("syncStatus").innerText = "⏳ 正在同步...";
    const prices = await fetchPrices();
    
    if (prices && prices[ticker]) {
        document.getElementById("queryResult").classList.remove("hidden");
        document.getElementById("resTicker").innerText = ticker;
        document.getElementById("resPrice").innerText = "￥" + prices[ticker].toFixed(2);
        document.getElementById("syncStatus").innerText = "● 数据已更新";
    } else {
        alert("未在 Google Sheet 中找到代码: " + ticker);
    }
}

// 2. 核心数据同步
async function fetchPrices() {
    try {
        const res = await fetch(CSV_URL, { cache: "no-cache" });
        const text = await res.text();
        const rows = text.split(/\r?\n/).slice(1);
        let prices = {};
        rows.forEach(r => {
            const cols = r.split(",");
            if (cols[0] && cols[1]) {
                const s = cols[0].replace(/"/g, '').trim().toUpperCase();
                const p = parseFloat(cols[1].replace(/"/g, '').trim());
                if (!isNaN(p)) prices[s] = p;
            }
        });
        return prices;
    } catch (e) {
        console.error("Fetch Error:", e);
        return null;
    }
}

// 3. IRR 计算
function calculateXIRR(cfs) {
    if (cfs.length < 2) return 0;
    let rate = 0.1;
    for (let i = 0; i < 60; i++) {
        let npv = 0, dnpv = 0;
        for (let cf of cfs) {
            let t = (cf.date - cfs[0].date) / (365 * 24 * 3600 * 1000);
            let factor = Math.pow(1 + rate, t);
            npv += cf.amount / factor;
            dnpv -= t * cf.amount / (factor * (1 + rate));
        }
        let nextRate = rate - npv / dnpv;
        if (Math.abs(nextRate - rate) < 0.0001) return nextRate;
        rate = nextRate;
    }
    return rate;
}

// 4. 渲染与更新
async function render() {
    localStorage.setItem("my_trades_v5", JSON.stringify(trades));
    const tbody = document.getElementById("tradeBody");
    tbody.innerHTML = "";
    
    trades.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach((t, i) => {
        tbody.innerHTML += `
            <tr class="border-b hover:bg-slate-50 transition">
                <td class="p-4 text-slate-600 font-mono">${t.date}</td>
                <td class="p-4 font-bold text-slate-800">${t.ticker}</td>
                <td class="p-4"><span class="px-2 py-1 rounded text-xs font-bold ${t.type==='BUY'?'bg-red-50 text-red-600':'bg-emerald-50 text-emerald-600'}">${t.type}</span></td>
                <td class="p-4 font-mono">${t.shares}</td>
                <td class="p-4 font-mono">￥${t.price.toFixed(2)}</td>
                <td class="p-4"><button onclick="deleteTrade(${i})" class="text-slate-300 hover:text-red-500 transition">删除</button></td>
            </tr>`;
    });

    const prices = await fetchPrices();
    if (!prices) return;

    let inventory = {};
    let historyCfs = trades.map(t => ({
        date: new Date(t.date),
        amount: t.type === 'BUY' ? -(t.shares * t.price) : (t.shares * t.price)
    }));

    trades.forEach(t => {
        inventory[t.ticker] = (inventory[t.ticker] || 0) + (t.type === 'BUY' ? t.shares : -t.shares);
    });

    let currentMV = 0;
    for (let ticker in inventory) {
        if (inventory[ticker] > 0) {
            currentMV += inventory[ticker] * (prices[ticker] || 0);
        }
    }

    const finalCfs = [...historyCfs, { date: new Date(), amount: currentMV }];
    const irr = calculateXIRR(finalCfs.sort((a,b) => a.date - b.date));

    document.getElementById("totalValue").innerText = "￥" + currentMV.toLocaleString(undefined, {minimumFractionDigits:2});
    document.getElementById("irrDisplay").innerText = (irr * 100).toFixed(2) + "%";
}

function addTrade() {
    const t = {
        date: document.getElementById("date").value,
        ticker: document.getElementById("ticker").value.toUpperCase().trim(),
        type: document.getElementById("type").value,
        shares: parseFloat(document.getElementById("shares").value),
        price: parseFloat(document.getElementById("price").value)
    };
    if(!t.date || !t.ticker || isNaN(t.shares)) return;
    trades.push(t);
    render();
}

function deleteTrade(index) {
    if(confirm("确定删除记录吗？")) { trades.splice(index, 1); render(); }
}

document.getElementById('date').value = new Date().toISOString().split('T')[0];
render();
</script>
</body>
</html>
